<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Game Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #1a1a1a 50%, #181818 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Custom Titlebar */
        .titlebar {
            height: 40px;
            background: linear-gradient(180deg, #2d2d2d 0%, #262626 50%, #252525 100%);
            border-bottom: 1px solid #404040;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            -webkit-app-region: drag;
            user-select: none;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .titlebar-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
        }

        .titlebar-tabs {
            display: flex;
            gap: 5px;
            -webkit-app-region: no-drag;
        }

        .titlebar-tab {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .titlebar-tab:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.95);
        }

        .titlebar-tab.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }

        .titlebar-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .titlebar-button {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .titlebar-button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.95);
        }

        .titlebar-button.close:hover {
            background: #e81123;
            color: #fff;
        }

        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .viewport-container {
            flex: 1;
            background: #000;
            position: relative;
            display: none;
        }

        .viewport-container.active {
            display: flex;
        }

        .terminal-container {
            flex: 1;
            background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            display: none;
            scroll-behavior: smooth;
        }

        .terminal-container.active {
            display: block;
        }

        /* Styled Scrollbar */
        .terminal-container::-webkit-scrollbar {
            width: 12px;
        }

        .terminal-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            margin: 4px;
        }

        .terminal-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff8c00 0%, #ff6600 100%);
            border-radius: 6px;
            border: 2px solid rgba(0, 0, 0, 0.3);
        }

        .terminal-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ffa500 0%, #ff7700 100%);
        }

        .terminal-output {
            display: flex;
            flex-direction: column;
            gap: 6px;
            user-select: text;
        }

        .terminal-line {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            padding: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-line.success {
            color: rgba(100, 255, 150, 0.95);
        }

        .terminal-line.error {
            color: rgba(255, 107, 107, 0.95);
        }

        /* Compilation Scene */
        .compilation-scene {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0f0f0f 50%, #0a0a0a 100%);
        }

        .compilation-text {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        .compilation-status {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8c00, #ff6600);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Custom Titlebar -->
    <div class="titlebar">
        <div class="titlebar-left">
            <div class="titlebar-title">🎮 Void Game Runner</div>
            <div class="titlebar-tabs">
                <button class="titlebar-tab active" data-tab="viewport">Viewport</button>
                <button class="titlebar-tab" data-tab="terminal">Terminal</button>
            </div>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-button minimize" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M0 6h12" stroke="currentColor" stroke-width="1"/>
                </svg>
            </button>
            <button class="titlebar-button maximize" title="Maximize">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/>
                </svg>
            </button>
            <button class="titlebar-button close" title="Close">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- Viewport -->
        <div class="viewport-container active">
            <div class="compilation-scene">
                <div>
                    <div class="compilation-text">Compiling...</div>
                    <div class="compilation-status">Starting build...</div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Terminal -->
        <div class="terminal-container">
            <div class="terminal-output">
                <div class="terminal-line">[Void Engine] Initializing...</div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.titlebar-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                // Update active tab
                document.querySelectorAll('.titlebar-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // Show corresponding content
                document.querySelectorAll('.viewport-container, .terminal-container').forEach(c => {
                    c.classList.remove('active');
                });
                document.querySelector(`.${targetTab}-container`).classList.add('active');
            });
        });

        // Window controls
        document.querySelector('.minimize').addEventListener('click', () => {
            window.electronAPI.minimizeWindow();
        });

        document.querySelector('.maximize').addEventListener('click', () => {
            window.electronAPI.maximizeWindow();
        });

        document.querySelector('.close').addEventListener('click', () => {
            window.electronAPI.closeWindow();
        });

        // Listen for game output
        window.electronAPI.onGameOutput((data) => {
            const terminalOutput = document.querySelector('.terminal-output');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            if (data.type === 'stderr') {
                line.classList.add('error');
            } else if (data.type === 'exit') {
                line.classList.add(data.data === 0 ? 'success' : 'error');
                line.textContent = `[Process exited with code ${data.data}]`;
            } else {
                line.textContent = data.data;
            }
            
            terminalOutput.appendChild(line);
            
            // Auto-scroll
            const terminal = document.querySelector('.terminal-container');
            terminal.scrollTop = terminal.scrollHeight;
        });

        // Listen for compilation progress
        window.electronAPI.onCompilationProgress((progress) => {
            const progressFill = document.querySelector('.progress-fill');
            const statusText = document.querySelector('.compilation-status');
            
            progressFill.style.width = `${progress.progress}%`;
            statusText.textContent = progress.message;
        });
    </script>
</body>
</html>
