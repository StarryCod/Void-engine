<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Engine Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-code: #0d1117;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f0883e;
            --accent-purple: #a371f7;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --border-color: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 16px;
            min-height: 100vh;
        }
        
        /* Mobile Navigation */
        .mobile-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .nav-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        .nav-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text-primary);
            position: relative;
            transition: all 0.3s;
        }
        
        .nav-toggle span::before,
        .nav-toggle span::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 2px;
            background: var(--text-primary);
            left: 0;
            transition: all 0.3s;
        }
        
        .nav-toggle span::before { top: -6px; }
        .nav-toggle span::after { top: 6px; }
        
        .nav-title {
            font-weight: 600;
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 56px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 56px);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            transition: left 0.3s ease;
            z-index: 999;
            padding: 16px 0;
        }
        
        .sidebar.open {
            left: 0;
        }
        
        .sidebar-overlay {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }
        
        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        .nav-section {
            padding: 8px 16px;
        }
        
        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }
        
        .nav-link {
            display: block;
            padding: 8px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        
        .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            border-left-color: var(--accent-blue);
        }
        
        .nav-link.working::after {
            content: '✓';
            float: right;
            color: var(--accent-green);
            font-size: 12px;
        }
        
        .nav-link.stub::after {
            content: '○';
            float: right;
            color: var(--accent-orange);
            font-size: 12px;
        }
        
        /* Main Content */
        .content {
            margin-top: 56px;
            padding: 24px 16px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
        }
        
        h1 {
            font-size: 2em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-top: 0;
        }
        
        h1:first-child {
            margin-top: 0;
        }
        
        h2 {
            font-size: 1.5em;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        
        h3 {
            font-size: 1.25em;
            color: var(--accent-purple);
        }
        
        h4 {
            font-size: 1.1em;
            color: var(--accent-green);
        }
        
        p {
            margin-bottom: 1em;
        }
        
        a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        /* Code */
        code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        pre {
            background: var(--bg-code);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 1em 0;
            -webkit-overflow-scrolling: touch;
        }
        
        pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
        }
        
        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            padding: 12px 16px;
            margin: 1em 0;
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
        }
        
        blockquote.warning {
            border-left-color: var(--accent-orange);
            background: rgba(240, 136, 62, 0.1);
        }
        
        blockquote.tip {
            border-left-color: var(--accent-green);
            background: rgba(63, 185, 80, 0.1);
        }
        
        blockquote.danger {
            border-left-color: var(--accent-red);
            background: rgba(248, 81, 73, 0.1);
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 14px;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }
        
        th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--accent-blue);
        }
        
        tr:nth-child(even) {
            background: var(--bg-secondary);
        }
        
        tr:hover {
            background: var(--bg-tertiary);
        }
        
        /* Lists */
        ul, ol {
            margin: 1em 0;
            padding-left: 24px;
        }
        
        li {
            margin-bottom: 8px;
        }
        
        /* Components */
        .component-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 1.5em 0;
        }
        
        .component-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .component-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .component-icon.working {
            background: rgba(63, 185, 80, 0.2);
        }
        
        .component-icon.stub {
            background: rgba(240, 136, 62, 0.2);
        }
        
        .component-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .component-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .component-status.working {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
        }
        
        .component-status.stub {
            background: rgba(240, 136, 62, 0.2);
            color: var(--accent-orange);
        }
        
        /* Diagram */
        .diagram {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 1.5em 0;
            overflow-x: auto;
        }
        
        .diagram-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .diagram-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .diagram-node {
            background: var(--bg-tertiary);
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 500;
            text-align: center;
        }
        
        .diagram-arrow {
            color: var(--accent-blue);
            font-size: 24px;
        }
        
        .diagram-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* Property Table */
        .property-table {
            width: 100%;
        }
        
        .property-name {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-purple);
            font-weight: 500;
        }
        
        .property-type {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* Badge */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-blue { background: rgba(88, 166, 255, 0.2); color: var(--accent-blue); }
        .badge-green { background: rgba(63, 185, 80, 0.2); color: var(--accent-green); }
        .badge-orange { background: rgba(240, 136, 62, 0.2); color: var(--accent-orange); }
        .badge-purple { background: rgba(163, 113, 247, 0.2); color: var(--accent-purple); }
        .badge-red { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--bg-primary);
            color: var(--accent-blue);
        }
        
        /* Progress */
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            border-radius: 4px;
        }
        
        /* Search */
        .search-box {
            margin: 16px;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }
        
        .search-input::placeholder {
            color: var(--text-muted);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-color);
        }
        
        /* Mermaid diagrams */
        .mermaid {
            text-align: center;
            margin: 1em 0;
        }
        
        /* Responsive */
        @media (min-width: 1024px) {
            .mobile-nav {
                left: 280px;
            }
            
            .sidebar {
                left: 0;
            }
            
            .sidebar-overlay {
                display: none;
            }
            
            .content {
                margin-left: 280px;
                padding: 32px 48px;
            }
            
            .nav-toggle {
                display: none;
            }
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="mobile-nav">
        <button class="nav-toggle" id="navToggle">
            <span></span>
        </button>
        <span class="nav-title">Void Engine</span>
    </nav>
    
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
        </div>
        <nav id="navContent"></nav>
    </aside>
    
    <main class="content" id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Загрузка документации...</p>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });
        
        // Custom renderer
        const renderer = new marked.Renderer();
        
        // Custom blockquote
        renderer.blockquote = function(quote) {
            let type = '';
            if (quote.includes('WARNING:') || quote.includes('ВНИМАНИЕ:')) type = 'warning';
            if (quote.includes('TIP:') || quote.includes('СОВЕТ:')) type = 'tip';
            if (quote.includes('DANGER:') || quote.includes('ОПАСНОСТЬ:')) type = 'danger';
            return `<blockquote class="${type}">${quote}</blockquote>`;
        };
        
        // Custom table
        renderer.table = function(header, body) {
            return `<div class="table-wrapper"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
        };
        
        marked.use({ renderer });
        
        // Load and parse markdown
        async function loadDocumentation() {
            try {
                const response = await fetch('how_to_use.md');
                if (!response.ok) throw new Error('Failed to load');
                const markdown = await response.text();
                
                // Parse and render
                document.getElementById('content').innerHTML = marked.parse(markdown);
                
                // Generate navigation
                generateNavigation();
                
                // Highlight all code blocks
                document.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
                
                // Handle internal links
                handleInternalLinks();
                
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <h1>Ошибка загрузки</h1>
                    <p>Не удалось загрузить документацию. Убедитесь, что файл how_to_use.md находится в той же папке.</p>
                    <p style="color: var(--accent-red);">${error.message}</p>
                `;
            }
        }
        
        // Generate navigation from headers
        function generateNavigation() {
            const headers = document.querySelectorAll('h1, h2, h3');
            const nav = document.getElementById('navContent');
            let currentSection = null;
            let html = '';
            
            headers.forEach(header => {
                const id = header.id || header.textContent.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
                header.id = id;
                
                if (header.tagName === 'H1') {
                    html += `<div class="nav-section">
                        <div class="nav-section-title">${header.textContent}</div>
                    </div>`;
                } else if (header.tagName === 'H2') {
                    const status = header.textContent.includes('(рабочий)') ? 'working' : 
                                   header.textContent.includes('(заглушка)') ? 'stub' : '';
                    html += `<a href="#${id}" class="nav-link ${status}">${header.textContent.replace('(рабочий)', '').replace('(заглушка)', '').trim()}</a>`;
                }
            });
            
            nav.innerHTML = html;
        }
        
        // Handle internal links
        function handleInternalLinks() {
            document.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.querySelector(link.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                        // Close sidebar on mobile
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarOverlay').classList.remove('open');
                    }
                });
            });
        }
        
        // Toggle sidebar
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        });
        
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        });
        
        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const text = link.textContent.toLowerCase();
                link.style.display = text.includes(query) ? 'block' : 'none';
            });
        });
        
        // Active nav link on scroll
        window.addEventListener('scroll', () => {
            const headers = document.querySelectorAll('h2');
            let current = '';
            
            headers.forEach(header => {
                const rect = header.getBoundingClientRect();
                if (rect.top <= 100) {
                    current = header.id;
                }
            });
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) {
                    link.classList.add('active');
                }
            });
        });
        
        // Initialize
        loadDocumentation();
    </script>
</body>
</html>
